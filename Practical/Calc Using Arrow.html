<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d2671, #c33764);
            font-family: Arial, sans-serif;
        }

        .calculator {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            width: 280px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .display {
            width: 100%;
            height: 50px;
            font-size: 22px;
            text-align: right;
            padding: 10px;
            border: none;
            outline: none;
            background: #f1f1f1;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .operator {
            background: #ff9f1c;
            color: white;
        }

        .number {
            background: #2ec4b6;
            color: white;
        }

        .clear {
            background: #e63946;
            color: white;
            grid-column: span 2;
        }

        .equal {
            background: #4361ee;
            color: white;
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" class="display" placeholder="0" disabled>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="append('/')">/</button>

            <button class="number" onclick="append('7')">7</button>
            <button class="number" onclick="append('8')">8</button>
            <button class="number" onclick="append('9')">9</button>
            <button class="operator" onclick="append('*')">*</button>

            <button class="number" onclick="append('4')">4</button>
            <button class="number" onclick="append('5')">5</button>
            <button class="number" onclick="append('6')">6</button>
            <button class="operator" onclick="append('-')">-</button>

            <button class="number" onclick="append('1')">1</button>
            <button class="number" onclick="append('2')">2</button>
            <button class="number" onclick="append('3')">3</button>
            <button class="operator" onclick="append('+')">+</button>

            <button class="number" onclick="append('0')">0</button>
            <button class="number" onclick="append('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById("display");

        // Arrow function to add value
        const append = (value) => {
            display.value += value;
        };
        const clearDisplay = () => {
            display.value = "";
        };
        const calculate = () => {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Error";
            }
        };
    </script>

</body>
</html>
