<html>
<head>
    <title>Digital Clock</title>
    <style>
        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        fieldset {
            border: .2px solid #2cff00;
            padding: 40px 80px;
            box-shadow: 0 0 25px #2cff00;
        }

        h1 {
            text-align: center;
            color: #2cff00;
            margin-bottom: 20px;
            font-size: 40px;
        }

        #clock {
            font-size: 48px;
            color: #2cff00;
            text-align: center;
            letter-spacing: 3px;
            text-shadow:
                0 0 0 0 0 0 0 .5px #2cff00,
                0 0 0 0 0 0 0 .90px #2cff00,
                0 0 0 0 0 0 0 .20px #2cff00,
                0 0 0 0 0 0 0 .40px #00ff99;
        }
    </style>
</head>

<body>
    <fieldset>
        <h1>Digital Clock</h1>
        <div id="clock"></div>
    </fieldset>

    <script>
        function Time() {
            let now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let session = "AM";

            if (hours >= 12) {
                session = "PM";
            }

            if (hours > 12) {
                hours = hours - 12;
            }

            if (hours === 0) {
                hours = 12;
            }

            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("clock").innerHTML =
                hours + ":" + minutes + ":" + seconds + " " + session;
        }
        setInterval(Time, 1000);
        Time();
    </script>
</body>
</html>
