        <title>Table</title>
    </head>
    <body>
        <h1>Maths Table</h1>
    </body>
    <script>
        
        for (let a = 1; a<=10;a++){
            document.write(`5 X ${a} = ${5 * a} <br> `)
        }
        let b = 1; 
        while(b<=10){
           document.write(`5 X ${b} = ${5 * b} <br> `) 
           b++;
        }
        let c = 1;
        do{
            document.write(`5 X ${c} = ${5 * c} <br> ` )
            c++
        }
         while(c<=10)

         


    </script>
</html>
