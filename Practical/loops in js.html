<html>
    <head>
        <title>Loops in JS</title>
    </head>
<body>
    <h1>Loops in Java Script</h1>


    <script>
        
        for (let a = 0 ; a <= 5 ; a++ ){
            document.writeln("For Loop Number :" +  a  + "<br>")
        }
        let i = 0;
        while(i <= 5){  
            document.writeln("While Loop Number :" +  i  + "<br>");
            i++;
         }

         let b = 1;
         do{
             document.writeln("Do Loop Number :" +  b  + "<br>");
             b++
         }
         while(b <= 5);

    </script>
      
</body>
    
</html>
