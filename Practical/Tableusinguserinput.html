<html>
<head>
    <title>Table</title>
</head>
<body>
    <h1>Table Using User Input</h1>

    <script>
        let numb = Number(prompt("Enter your Number"));

        for (let a = 1; a <= 10; a++) {
            document.write(`${numb} X ${a} = ${numb * a} <br>`);
        }
    </script>
</body>
</html>
